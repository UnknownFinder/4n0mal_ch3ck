#!/usr/sbin/nft -f
#Сохраняем это в /etc/nftables.conf и потом делаем sudo nft -f /etc/nftables.conf
#Очищаем всё
nft flush ruleset
#================================================================================
#1 ТАБЛИЦА - oбщая для IPv4 и IPv6 (семейство inet)
table inet firewall {
#================================================================================
#2 МНОЖЕСТВА - для динамического управления IP
#Белый список (whitelist)
	set whitelist {
		type ipv4_addr
#Сюда можно добавлять IP через nft add element inet firewall whitelist {IP}
		elements={ 127.0.0.1, 192.168.1.0/24 } #Локальные по умолчанию
		flags interval #Включаем поддержку диапазонов
		}
#Чёрный список (blacklist)
	set blacklist {
		type ipv4_addr
#Сюда можно добавлять IP через nft add element inet firewall blacklist {IP}
		elements={ 185.130.5.0/24 } #Пример подозрительных сетей
		flags interval
		}
#Для rate limiting - будем хранить IP, которые превысили лимиты
	set port_scanners {
		type ipv4_addr
		size 65535 #Максимальный размер множества
		flags timeout #IP будут автоматически удаляться по таймауту
		}
#================================================================================
#3 ЦЕПОЧКИ
# ---цепочка для обработки входящих пакетов---
	chain input {
		type filter hook input priority 0; policy drop # дроп всего, что не разрешено
#		1) Валидация пакетов
		ct state invalid drop
		comment "Не распознано conntarck"
#		2) Защита от подделки IP
#		Дроп пакетов с source IP, которые не могут быть source-рами
		ip saddr 127.0.0.0/8 iif != "lo" drop
		comment "Защита от спуфинга - локальные адреса только с lo"
		ip saddr 0.0.0.0/8 drop #Исторический broadcast
#		ip saddr 10.0.0.0/8 drop #Частные сети (если не твои)
#		ip saddr 172.16.0.0/12 drop #Частные сети (если не твои)
#		ip saddr 192.168.0.0/16 drop #Частные сети (если не твои)
#		ip saddr 169.254.0.0/16 drop #Link-local
		ip saddr 224.0.0.0/4 drop #Multicast
		ip saddr 240.0.0.0/4 drop #Зарезервировано
		comment "Дропаем  пакеты с невалидными source IP (RFC 5735)"
#		3) Проверка черного и белого списков
		ip saddr @blacklist drop
		comment "Дропаев всех из чёрного списка"
		ip saddr @whitelist accept
		comment "Из белого списка = можно всё"
#		4) Loopback
		iif == "lo" accept
		comment "Локальный интерфейс - всегда доверенный"
#		5) Разрешаем уже установленные соединения
		ct state established,related accept
		comment "Пропускаем пакеты, относящиеся к уже открытым соединениям"
#		6) ICMP - лимитируем, но не фулл-блок
#ICMP нужен для нормальной работы сети (PMTUD, и т.д)#
		icmp type {
			echo-request, #ping
			destination-unreachable,
			time-exeeded,
			parameter-problem
			} limit rate 10/second accept
			comment "Разрешаем нужные ICMP-типы, но с ограничением скорости"
		icmpv6 type {
			echo-request,
			destination-unreachable,
			packet-too-big,
			time-exeeded,
			parameter-problem,
			nd-router-solicit,
			nd-router-advert,
			nd-neighbor-solicit,
			nd-neighbor-advert
			} limit rate 10/second accept
			comment "Для IPv6"
#               Дропаем остальной ICMP
		icmp type drop
		icmpv6 type drop
#		7) Защита от ссканирования (nmap и прочая суета)
		# NULL-scan (пакеты без флагов)
		tcp flags & (fin|syn|rst|psh|ack|urg) == fin drop
		comment "FIN-scan = чё-то подозрительное"
		# Xmas-scan (FIN,PSH,URG одновременно)
		tcp flags & (fin|syn|rst|psh|ack|urg) == fin|psh|urg drop
		comment "Xmas-scan - все флаги кроме SYN = чё-то подозрительное"
# SYN+FIN (нелегальная комбинация)
		tcp flags & (syn|fin) == syn|fin drop
		comment "SYN+FIN вместе - такого не бывает в нормальном TCP"
#		8) Rate limiting для новых соединений
		# Защита от DDoS и brute-force
		tcp flags syn limit rate 30/second burst 50 accept
		tcp flags syn drop
		comment "Ограничиваем количество новых TCP-соединений"
#Если кто-то превышает лимит SYN-пакетов, кидаем его в порт-сканеры
		tcp flags syn add @port_scanners { ip saddr timeout 1h }
		comment "Нарушителям - бан на час"
#		9) Разрешённые соединения
#		SSH - только с rate limit против брутфорса
		tcp dport 22 accept
		comment "SSH разрешен под лимитом выше"
		#HTTP/HTTPS
		tcp dport { 80, 443 } accept
		comment "Веб-сервер открыт для всех"
		#DNS (если сервер DNS)
		udp dport 53 accept
		tcp dport 53 accept
		comment "DNS-сервер"
		#DHCP client (если девайс получает IP по DHCP)
		udp sport 67 udp dport 68 accept
		comment "DHCP-клиент"
#		10) Логирование отброшенных пакетов
#Логируем только те пакеты, которые дошли до этого момента
#и не были приняты (чтобы не забивать логи мусором)
		limit rate 10/minute log prefix "nftables DROPPED:" flags all
		comment "Логируем отброшенные пакеты, но не чаще чем 10 раз в минуту"
#Политика chain input = drop -> дроп всего, что не принято
		}
#---Цепочка для форварда (если сервер - роутер)---
	chain forward {
		type filter hook forward priority 0; policy drop
#Если не форвардишь пакеты - тут всё дропнется политикой
#Если форвардишь - нужно добавлять правила, аналогично input
		comment "По умолчанию форвард запрещён"
#---Цепочка для исходящих пакетов (выход в интернет)---
	chain output {
		type filter hook output priority 0; policy accept
#По дефолту на выход нет ограничений, но если надо - настраивай
#Например, можно запретить SMTP-трафик, если не почтовик
#		tcp dport 25 drop
#		comment "Блокируем исходящий SMTP (чтобы не слать спам с заражённой машины)"
#Или запретить исходящие сканы
#		comment "Исходящие соединения разрешены по умолчанию"
		}
#=========================================================================
#4 NAT (если нужен маскарадинг для интернета)
	chain nat_prerouting {
		type nat hook prerouting priority -100;
		#Сюда  правила для перенаправления портов (port forwarding)
		#Например, проброс 80 на внутренний сервер:
		#tcp dport 80 dnat to 192.168.1.100:80
		comment "NAT prerouting - для port forwarding"
		}
	chain nat_postrouting {
		type nat hook postrouting priority 100;
		#МАскарадинг - если сервер раздает интернет
		#oif "eth0" masquerade
		comment "NAT postrouting - для masquerade"
		}
	}
}
